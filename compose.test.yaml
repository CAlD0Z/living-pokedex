# Throwaway stack to validate the fresh-install path (prod image + empty volume).
# Run:  docker compose -p ldtest -f compose.test.yaml up -d --build
# Tear: docker compose -p ldtest -f compose.test.yaml down -v
services:
  app:
    build:
      context: .
      target: prod
    ports:
      - "8082:3000"
    environment:
      - DATABASE_URL=postgres://pokedex:pokedex@db:5432/pokedex
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=pokedex
      - PGPASSWORD=pokedex
      - PGDATABASE=pokedex
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=pokedex
      - POSTGRES_PASSWORD=pokedex
      - POSTGRES_DB=pokedex
    volumes:
      - testdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokedex"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  testdata:
